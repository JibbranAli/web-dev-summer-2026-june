<body>

<h1> Welcome to JS-2  </h1>
<script>
	var a = parseInt (prompt ("Enter first number : "));
	var b = parseInt (prompt ("Enetr Second Number : "));
	document.write(a + b);
	document.write("<br>");
	document.write(a - b);
	document.write("<br>");
	document.write(a * b);
	document.write("<br>");
	document.write(a / b);
	document.write("<br>");
</script>
